name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      deployments: write
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so `sentry-cli releases set-commits --auto` can resolve
          # the previous release's SHA for commit association. Shallow clones
          # error with "Could not find the SHA of the previous release".
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build SPA
        run: pnpm --filter @hearth/web build

      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/worker
          command: d1 migrations apply hearth --remote

      - name: Upload Worker version
        id: upload
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/worker
          command: versions upload --message "ci:${{ github.sha }}"

      - name: Extract uploaded Worker Version ID
        id: version
        env:
          UPLOAD_OUTPUT: ${{ steps.upload.outputs.command-output }}
        run: |
          VERSION_ID=$(printf '%s\n' "$UPLOAD_OUTPUT" | grep -oE 'Worker Version ID: [a-f0-9-]+' | head -1 | awk '{print $NF}')
          if [ -z "$VERSION_ID" ]; then
            echo "::error::Could not find 'Worker Version ID: <uuid>' in the upload step's output."
            exit 1
          fi
          echo "id=$VERSION_ID" >> "$GITHUB_OUTPUT"
          echo "Extracted Worker Version ID: $VERSION_ID"

      - name: Deploy version (flip traffic atomically)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/worker
          command: versions deploy ${{ steps.version.outputs.id }}@100% --yes

      - name: Upload Sentry source maps (SPA)
        uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT_WEB }}
        with:
          environment: production
          sourcemaps: ./apps/web/dist
          version: ${{ github.sha }}

      - name: Notify Discord
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -X POST -H "Content-Type: application/json" \
              -d "{\"content\":\":rocket: Hearth deployed — version \`${GITHUB_SHA}\`\"}" \
              "$DISCORD_WEBHOOK_URL"
          fi
