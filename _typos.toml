# typos (https://github.com/crate-ci/typos) config.
#
# Uses the curated known-typo list approach (only flags KNOWN misspellings),
# which keeps false-positive rate near zero for project-specific nouns —
# `Hearth`, `Wrangler`, `Miniflare`, `cuid`, `FTS5`, etc. all pass through
# without an allowlist entry because they aren't in the known-bad list.
#
# Add an entry here only when typos flags a legitimate token. Expect <5
# entries at steady state.

[files]
extend-exclude = [
  "pnpm-lock.yaml",
  "*.snap",
  "dist/**",
  ".wrangler/**",
  ".turbo/**",
  "coverage/**",
]

# Pluralised acronyms / SQL keywords (`SELECTs`, `INSERTs`, `UPDATEs`,
# `URLs`, `IDs` of 3+ letters) trip typos's word-splitter, which can
# isolate `SELEC` and "correct" it to `SELECT`. The pattern below silences
# any UPPERCASE token of 3+ letters followed by a lowercase `s` — covering
# the whole pluralised-acronym category without hiding misspellings in
# unrelated mixed-case identifiers.
[default]
extend-ignore-identifiers-re = ["^[A-Z]{3,}s$"]
